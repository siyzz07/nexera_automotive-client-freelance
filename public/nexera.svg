<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="brandGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00ff66" />
      <stop offset="100%" stop-color="#00ba3e" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>
  <!-- Background -->
  <rect width="100" height="100" rx="24" fill="#050505" />
  
  <!-- Glowing N Letter -->
  <path d="M30 70 V30 L70 70 V30" fill="none" stroke="url(#brandGradient)" stroke-width="12" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)" />
</svg>
